<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Ranger: ฮีโร่แยกขยะ (AI Vision)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="top-bar">
            <div class="title">🌍 ECO-RANGER</div>
            <div class="score-board">
                ⭐ คะแนน: <span id="score">0</span>
            </div>
            <div id="combo-badge" class="hidden">🔥 COMBO x2!</div>
        </header>

        <div class="mascot-section">
            <div id="mascot" class="bounce">🤖</div>
            <div id="game-message" class="speech-bubble">สวัสดีฮีโร่! ระบบ AI Vision พร้อมแล้ว ถ่ายรูปขยะให้ฉันดูหน่อย!</div>
        </div>

        <div class="screen-area">
            <div id="status">กำลังเตรียมระบบ...</div>
            
            <div id="camera-container" style="display: none;">
                <video id="video-preview" autoplay playsinline></video>
                <div class="camera-controls">
                    <button id="switch-camera-btn" class="btn-secondary">🔄 สลับกล้อง</button>
                    <button id="capture-btn" class="btn-action">📸 ถ่ายภาพ!</button>
                    <button id="close-camera-btn" class="btn-danger">❌ ปิด</button>
                </div>
            </div>

            <img id="image-preview" src="" style="display: none;" />
        </div>

        <div id="input-options" class="control-panel">
            <button id="camera-btn" class="btn-primary">📷 เปิดกล้องสแกนขยะ</button>
            <button id="browse-btn" class="btn-secondary">📁 เลือกรูปจากเครื่อง</button>
            <input type="file" id="image-upload" accept="image/*" style="display: none;"/>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
